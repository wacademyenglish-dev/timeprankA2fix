<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wolfflix Engine - The Office A2 (Time Prank)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Press+Start+2P&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; overflow: hidden; }

        .font-retro { font-family: 'Press Start 2P', monospace; }

        /* RPG Backgrounds */
        .office-bg {
            background-color: #e2e8f0;
            background-image: url("https://www.transparenttextures.com/patterns/cubes.png");
            color: #0f172a;
        }

        /* --- BATTLE ANIMATIONS --- */
        @keyframes rollDice {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(90deg) scale(1.1); }
            50% { transform: rotate(180deg) scale(1.2); }
            75% { transform: rotate(270deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }
        .animate-roll { animation: rollDice 0.4s ease-out; }

        @keyframes floatItem {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(3deg); }
        }
        .animate-float { animation: floatItem 3s infinite ease-in-out; }

        @keyframes heroTackle {
            0% { transform: translate(0, 0) scale(1); }
            40% { transform: translate(80px, -40px) scale(1.1); }
            60% { transform: translate(100px, -50px) scale(1.1); }
            100% { transform: translate(0, 0) scale(1); }
        }
        .anim-hero-tackle { animation: heroTackle 0.5s ease-in-out forwards; }

        @keyframes enemyTackle {
            0% { transform: translate(0, 0) scale(1); }
            40% { transform: translate(-80px, 40px) scale(1.1); }
            60% { transform: translate(-100px, 50px) scale(1.1); }
            100% { transform: translate(0, 0) scale(1); }
        }
        .anim-enemy-tackle { animation: enemyTackle 0.5s ease-in-out forwards; }

        @keyframes magicCast {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.2); filter: brightness(1.5) drop-shadow(0 0 20px #38bdf8); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        .anim-hero-magic { animation: magicCast 0.5s ease-in-out forwards; }

        @keyframes damageShake {
            0%, 100% { transform: translateX(0); filter: brightness(1); }
            20% { transform: translateX(-10px); filter: brightness(0.5) sepia(1) hue-rotate(-50deg) saturate(5); }
            40% { transform: translateX(10px); filter: brightness(0.5) sepia(1) hue-rotate(-50deg) saturate(5); }
            60% { transform: translateX(-10px); filter: brightness(0.5) sepia(1) hue-rotate(-50deg) saturate(5); }
            80% { transform: translateX(10px); filter: brightness(0.5) sepia(1) hue-rotate(-50deg) saturate(5); }
        }
        .anim-damage { animation: damageShake 0.4s ease-in-out forwards; }

        @keyframes projectileFly {
            0% { top: 60%; left: 20%; transform: scale(0.5); opacity: 1; }
            90% { top: 20%; left: 70%; transform: scale(2); opacity: 1; }
            100% { top: 20%; left: 70%; transform: scale(3); opacity: 0; }
        }
        .animate-projectile { animation: projectileFly 0.4s ease-in forwards; position: absolute; z-index: 50; }

        .pixelated-emoji {
            image-rendering: pixelated;
            filter: drop-shadow(3px 3px 0px rgba(0,0,0,0.5));
        }

        /* Standard Cinematic Masks */
        .mask-image-gradient { 
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 40%, rgba(0,0,0,0) 100%); 
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 40%, rgba(0,0,0,0) 100%); 
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(56, 189, 248, 0.4); border-radius: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes slideInLeft { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes slideInDown { from { opacity: 0; transform: translateY(-20px) translateX(-50%); } to { opacity: 1; transform: translateY(0) translateX(-50%); } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pop { 0% { transform: scale(0.8); opacity: 0;} 100% { transform: scale(1); opacity: 1;} }
        @keyframes popIn { 0% { transform: scale(0.5) rotate(-15deg); opacity: 0; } 80% { transform: scale(1.1) rotate(-5deg); opacity: 1; } 100% { transform: scale(1) rotate(-5deg); opacity: 1; } }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
        
        .animate-fadeIn { animation: fadeIn 0.5s ease-out forwards; }
        .animate-slideInRight { animation: slideInRight 0.3s ease-out forwards; }
        .animate-slideInLeft { animation: slideInLeft 0.3s ease-out forwards; }
        .animate-slideInDown { animation: slideInDown 0.3s ease-out forwards; }
        .animate-slideDown { animation: slideDown 0.3s ease-out forwards; }
        .animate-pop { animation: pop 0.2s ease-out forwards; }
        .animate-popIn { animation: popIn 0.3s ease-out forwards; }
        .animate-shake { animation: shake 0.5s ease-in-out forwards; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ASSETS & CONSTANTS ---
        const YOUTUBE_ID = "b1RoMfysruQ"; 
        const BG_OFFICE = "https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=2000&auto=format&fit=crop";
        const BG_DESK = "https://cloudfront-us-east-1.images.arcpublishing.com/estadao/SGMPKUUKHZNK5I52G645P5CVH4.jpg";
        const BG_CLOCK = "https://images.unsplash.com/photo-1501139083538-0139583c060f?q=80&w=2000&auto=format&fit=crop"; 
        const BG_COVER = "https://variety.com/wp-content/uploads/2025/09/TCDOFFI_EC059-e1757011016199.jpg?w=1000&h=667&crop=1";

        // --- REUSABLE UI ---
        const Icon = ({ name, size = 24, className = "" }) => (
            <i className={`fa-solid fa-${name} ${className}`} style={{ fontSize: size }}></i>
        );
        const IconReg = ({ name, size = 24, className = "" }) => (
            <i className={`fa-regular fa-${name} ${className}`} style={{ fontSize: size }}></i>
        );

        const GlassCard = ({ children, className = "", onClick = null }) => (
            <div 
                onClick={onClick}
                className={`bg-[#1e293b]/90 backdrop-blur-xl border border-white/10 rounded-2xl p-6 shadow-2xl ${onClick ? 'cursor-pointer hover:bg-white/10 transition-all active:scale-95' : ''} ${className}`}
            >
                {children}
            </div>
        );

        const Button = ({ onClick, children, primary, disabled, className = "", variant = "default", title }) => {
            const baseStyle = "font-bold rounded-xl px-6 py-3 transition-all duration-300 transform flex items-center justify-center gap-2";
            let colorStyle = "";
            if (variant === "netflix-white") colorStyle = "bg-white hover:bg-slate-200 text-slate-900";
            else if (variant === "netflix-dark") colorStyle = "bg-[#334155] hover:bg-[#475569] text-white border border-white/10";
            else if (primary) colorStyle = "bg-[#0ea5e9] hover:bg-[#0284c7] text-white shadow-[0_0_20px_rgba(14,165,233,0.4)]";
            else colorStyle = "bg-white/10 hover:bg-white/20 text-white border border-white/20";

            return (
                <button onClick={onClick} disabled={disabled} title={title} className={`${baseStyle} ${colorStyle} ${disabled ? "opacity-30 cursor-not-allowed" : "hover:scale-105 active:scale-95"} ${className}`}>
                {children}
                </button>
            );
        };

        // ==========================================
        // 🛠️ TEACHER TOOLSET
        // ==========================================
        const TeacherTools = ({ addXp }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [whiteboardOpen, setWhiteboardOpen] = useState(false);
            const [timerSeconds, setTimerSeconds] = useState(0);
            const [showPraise, setShowPraise] = useState(false);
            const timerRef = useRef(null);

            useEffect(() => {
                if (timerSeconds > 0) timerRef.current = setTimeout(() => setTimerSeconds(t => t - 1), 1000);
                return () => clearTimeout(timerRef.current);
            }, [timerSeconds]);

            const triggerPraise = () => {
                addXp(50);
                setShowPraise(true);
                setTimeout(() => setShowPraise(false), 2500);
            };

            return (
                <React.Fragment>
                {showPraise && (
                    <div className="fixed inset-0 z-[100] flex items-center justify-center pointer-events-none animate-popIn">
                    <div className="bg-gradient-to-r from-emerald-400 to-teal-500 text-white font-black text-6xl md:text-8xl px-12 py-8 rounded-3xl shadow-[0_0_100px_rgba(16,185,129,0.8)] border-4 border-white transform rotate-[-5deg] tracking-tighter uppercase">
                        PROMOTED! <br/><span className="text-4xl text-teal-100 block text-center mt-2">+50 XP</span>
                    </div>
                    </div>
                )}
                {timerSeconds > 0 && (
                    <div className="fixed top-6 left-1/2 transform -translate-x-1/2 z-50 bg-[#0ea5e9] text-white font-mono font-black text-4xl px-8 py-3 rounded-full shadow-[0_0_30px_rgba(14,165,233,0.6)] animate-pulse flex items-center justify-center">
                    00:{timerSeconds.toString().padStart(2, '0')}
                    </div>
                )}
                <div className="fixed top-6 left-6 z-[60] flex items-center gap-3">
                    <button onClick={() => setIsOpen(!isOpen)} className={`w-14 h-14 rounded-full flex items-center justify-center transition-all shadow-2xl z-20 ${isOpen ? 'bg-[#2563eb]' : 'bg-[#0ea5e9] hover:scale-105'}`}>
                        {isOpen ? <Icon name="xmark" size={28} className="text-white" /> : <Icon name="briefcase" size={28} className="text-white" />}
                    </button>
                    {isOpen && (
                    <div className="flex gap-3 bg-[#0f172a]/95 backdrop-blur-md p-2.5 rounded-2xl border border-white/10 shadow-2xl z-10 pl-6 -ml-4 animate-slideInLeft">
                        <button onClick={() => setWhiteboardOpen(!whiteboardOpen)} className="w-12 h-12 bg-[#1e293b] rounded-xl flex items-center justify-center hover:bg-[#334155] transition-colors"><Icon name="pencil" size={24} className="text-[#38bdf8]" /></button>
                        <button onClick={() => setTimerSeconds(60)} className="w-12 h-12 bg-[#1e293b] rounded-xl flex items-center justify-center hover:bg-[#334155] transition-colors"><Icon name="clock" size={24} className="text-[#eab308]" /></button>
                        <button onClick={triggerPraise} className="w-12 h-12 bg-[#1e293b] rounded-xl flex items-center justify-center hover:bg-[#334155] transition-colors"><Icon name="star" size={24} className="text-emerald-400" /></button>
                    </div>
                    )}
                </div>
                {whiteboardOpen && (
                    <div className="fixed right-0 top-0 h-full w-[400px] bg-[#0f172a]/95 backdrop-blur-2xl border-l border-white/10 z-[70] p-6 shadow-2xl flex flex-col animate-slideInRight">
                        <div className="flex justify-between items-center mb-6">
                            <h3 className="text-white font-bold text-xl flex items-center gap-2"><Icon name="pencil" size={18} className="text-[#38bdf8]"/> Teacher Notes</h3>
                            <button onClick={() => setWhiteboardOpen(false)} className="text-slate-400 hover:text-white"><Icon name="xmark" size={24}/></button>
                        </div>
                        <textarea className="flex-1 bg-white/5 border border-white/10 rounded-xl p-4 text-white text-lg font-mono focus:outline-none focus:border-[#0ea5e9] resize-none custom-scrollbar" placeholder="Type live notes, grammar examples, or vocabulary here..."></textarea>
                    </div>
                )}
                </React.Fragment>
            );
        };

        // ==========================================
        // 💼 THE OFFICE BATTLE RPG (A2 Past Simple)
        // ==========================================
        const OfficeBattleRPG = ({ addXp, onComplete }) => {
            const [gameState, setGameState] = useState('creation'); 
            const [hero, setHero] = useState(null);
            const [pos, setPos] = useState(0);
            
            const [enemy, setEnemy] = useState(null);
            const [selectedAction, setSelectedAction] = useState(null);
            const [currentQuestion, setCurrentQuestion] = useState(null);
            
            const [diceValue, setDiceValue] = useState(20);
            const [isRolling, setIsRolling] = useState(false);
            const [msg, setMsg] = useState("A wild problem appeared!");

            // 🧠 Sistema de Deck de Perguntas (Sem repetição)
            const ALL_QUESTIONS = [
                { q: "What is the past tense of EAT?", opts: ["Eated", "Ate", "Eaten"], correct: 1 },
                { q: "What is the past tense of FALL?", opts: ["Fell", "Falled", "Fallen"], correct: 0 },
                { q: "What is the past tense of CHANGE?", opts: ["Chang", "Changed", "Changes"], correct: 1 },
                { q: "What is the past tense of HAVE?", opts: ["Haved", "Had", "Has"], correct: 1 },
                { q: "Make it negative: 'I ate pie.'", opts: ["I didn't ate pie.", "I don't ate pie.", "I didn't eat pie."], correct: 2 },
                { q: "Make it negative: 'He fell asleep.'", opts: ["He didn't fall asleep.", "He didn't fell asleep.", "He wasn't fall asleep."], correct: 0 },
                { q: "What is the past tense of BECOME?", opts: ["Becomed", "Became", "Becomes"], correct: 1 },
                { q: "Complete: 'Yesterday, we ______ home early.'", opts: ["go", "goed", "went"], correct: 2 },
                { q: "What is the past tense of SHOOT?", opts: ["Shooted", "Shot", "Shoots"], correct: 1 },
                { q: "Complete: 'He ______ his computer clock.'", opts: ["changes", "changed", "change"], correct: 1 },
                { q: "What does 'promptly' mean?", opts: ["Slowly", "Immediately", "Never"], correct: 1 },
                { q: "Who is a 'horse doctor'?", opts: ["A horse with a PhD", "A veterinarian", "A bad doctor"], correct: 1 },
                { q: "What do you call a scheduled meeting?", opts: ["An appointment", "A discussion", "A timeline"], correct: 0 },
                { q: "Which one is an IRREGULAR verb?", opts: ["Work", "Change", "Eat"], correct: 2 },
                { q: "Which one is a REGULAR verb?", opts: ["Have", "Play", "Fall"], correct: 1 },
                { q: "Complete: 'Did you _____ the clock?'", opts: ["change", "changed", "changing"], correct: 0 },
                { q: "Complete: 'Where _____ Michael go?'", opts: ["did", "do", "was"], correct: 0 },
                { q: "If someone is 'asleep', they are...", opts: ["Working hard", "Not awake", "Eating pie"], correct: 1 },
                { q: "Translate 'Pegadinha' to English.", opts: ["Joke", "Prank", "Lie"], correct: 1 },
                { q: "Michael _____ a whole pie for lunch.", opts: ["had", "haved", "has"], correct: 0 }
            ];
            
            const [questionDeck, setQuestionDeck] = useState([]);

            useEffect(() => {
                setQuestionDeck([...ALL_QUESTIONS].sort(() => Math.random() - 0.5));
            }, []);

            const [heroAnimClass, setHeroAnimClass] = useState('');
            const [enemyAnimClass, setEnemyAnimClass] = useState('');
            const [showProjectile, setShowProjectile] = useState(false);

            const CLASSES = [
                { id: 'prankster', name: 'The Prankster', emoji: '📎', maxHp: 100, color: 'text-blue-400', desc: "Clever and annoying.", 
                  stats: { STR: 1, INT: 3, WIS: 2 },
                  actions: [
                      { name: 'Stapler Throw', type: 'attack', stat: 'STR', dmg: 20, desc: 'Physical attack.' },
                      { name: 'Change Clock', type: 'magic', stat: 'INT', dmg: 35, desc: 'Confuses enemy.' }
                  ]
                },
                { id: 'receptionist', name: 'The Receptionist', emoji: '☎️', maxHp: 90, color: 'text-pink-400', desc: "Controls communications.", 
                  stats: { STR: 0, INT: 2, WIS: 4 },
                  actions: [
                      { name: 'Transfer Call', type: 'attack', stat: 'WIS', dmg: 25, desc: 'Emotional damage.' },
                      { name: 'Coffee Break', type: 'heal', stat: 'WIS', dmg: -30, desc: 'Heal yourself.' }
                  ]
                },
                { id: 'assistant', name: 'Assistant to the Manager', emoji: '🤓', maxHp: 120, color: 'text-yellow-500', desc: "Follows the rules.", 
                  stats: { STR: 3, INT: 1, WIS: 1 },
                  actions: [
                      { name: 'Report to HR', type: 'magic', stat: 'INT', dmg: 30, desc: 'Devastating paperwork.' },
                      { name: 'Beet Attack', type: 'attack', stat: 'STR', dmg: 20, desc: 'Farm strength.' }
                  ]
                }
            ];

            const REGIONS = [
                { name: "The Break Room", enemy: { name: "Ringing Phone", maxHp: 60, hp: 60, emoji: "📱", dmg: 10, xp: 200 } },
                { name: "Sales Desk", enemy: { name: "Angry Client", maxHp: 100, hp: 100, emoji: "🤬", dmg: 18, xp: 300 } },
                { name: "Manager's Office", enemy: { name: "Sleepy Boss", maxHp: 160, hp: 160, emoji: "😴", dmg: 25, xp: 500 } }
            ];

            const selectHero = (c) => {
                setHero({ ...c, hp: c.maxHp });
                setGameState('map');
            };

            const enterEncounter = () => {
                const currentEnemy = REGIONS[pos].enemy;
                setEnemy({ ...currentEnemy });
                setMsg(`A wild ${currentEnemy.name.toUpperCase()} appeared!`);
                setGameState('encounter');
                setTimeout(() => setGameState('battle_menu'), 2500);
            };

            const handleActionClick = (action) => {
                setSelectedAction(action);

                let deck = [...questionDeck];
                if (deck.length === 0) deck = [...ALL_QUESTIONS].sort(() => Math.random() - 0.5);
                const nextQ = deck.shift();
                
                setQuestionDeck(deck);
                setCurrentQuestion(nextQ);
                setMsg(`To use ${action.name.toUpperCase()}, answer this:`);
                setGameState('question');
            };

            const handleAnswer = (idx) => {
                const isCorrect = (idx === currentQuestion.correct);
                setGameState('rolling');
                setIsRolling(true);

                if(isCorrect) setMsg(`Correct! Rolling D20 for productivity...`);
                else setMsg(`Wrong answer! The action fails!`);

                let ticks = 0;
                const interval = setInterval(() => {
                    setDiceValue(Math.floor(Math.random() * 20) + 1);
                    ticks++;
                    if (ticks > 15) {
                        clearInterval(interval);
                        setIsRolling(false);
                        const finalRoll = Math.floor(Math.random() * 20) + 1;
                        setDiceValue(finalRoll);

                        if (isCorrect) {
                            setMsg(`Rolled a ${finalRoll}! ${hero.name} used ${selectedAction.name}!`);
                            executeHeroAttack(finalRoll);
                        } else {
                            setMsg(`Your action missed...`);
                            setTimeout(() => executeEnemyTurn(hero.hp), 2000);
                        }
                    }
                }, 60);
            };

            const executeHeroAttack = (rollResult) => {
                setGameState('anim_attack');
                const statMod = hero.stats[selectedAction.stat];
                let damage = 0;

                if (selectedAction.type === 'attack') setHeroAnimClass('anim-hero-tackle');
                else if (selectedAction.type === 'magic') { setHeroAnimClass('anim-hero-magic'); setShowProjectile(true); }

                setTimeout(() => {
                    if (selectedAction.type === 'heal') {
                        const healAmt = Math.abs(selectedAction.dmg) + (statMod * 2) + rollResult;
                        const newHp = Math.min(hero.maxHp, hero.hp + healAmt);
                        setHero(h => ({...h, hp: newHp}));
                        setMsg(`${hero.name} rested and healed ${healAmt} HP!`);
                    } else {
                        setEnemyAnimClass('anim-damage');
                        damage = selectedAction.dmg + (statMod * 2) + rollResult;
                        const newEnemyHp = Math.max(0, enemy.hp - damage);
                        setEnemy(e => ({...e, hp: newEnemyHp}));
                        setMsg(`Very effective! Dealt ${damage} damage!`);
                    }

                    setTimeout(() => {
                        setHeroAnimClass(''); setEnemyAnimClass(''); setShowProjectile(false);
                        if (enemy.hp - damage <= 0) {
                            setMsg(`${enemy.name} was fired!`);
                            setTimeout(() => {
                                addXp(enemy.xp);
                                setGameState('victory');
                            }, 2000);
                        } else {
                            executeEnemyTurn(hero.hp);
                        }
                    }, 1500);

                }, selectedAction.type === 'magic' ? 400 : 250);
            };

            const executeEnemyTurn = (playerHpStart) => {
                setGameState('anim_enemy');
                setMsg(`${enemy.name} is retaliating!`);
                
                setTimeout(() => {
                    setEnemyAnimClass('anim-enemy-tackle');
                    setTimeout(() => {
                        setHeroAnimClass('anim-damage');
                        const damage = enemy.dmg + Math.floor(Math.random() * 8);
                        const finalHp = Math.max(0, playerHpStart - damage);
                        setHero(h => ({...h, hp: finalHp}));
                        setMsg(`Took ${damage} stress damage!`);

                        setTimeout(() => {
                            setEnemyAnimClass(''); setHeroAnimClass('');
                            if (finalHp <= 0) setGameState('gameover');
                            else {
                                setMsg(`What will ${hero.name.toUpperCase()} do?`);
                                setGameState('battle_menu');
                            }
                        }, 1500);
                    }, 250);
                }, 1000);
            };

            const nextRegion = () => {
                if (pos === REGIONS.length - 1) onComplete(); 
                else { setPos(pos + 1); setGameState('map'); }
            };

            const revive = () => {
                addXp(-100); 
                setHero(h => ({ ...h, hp: h.maxHp }));
                setGameState('map');
            };

            if (gameState === 'creation') {
                return (
                    <div className="w-full h-full flex flex-col items-center justify-center p-8 animate-fadeIn relative">
                        <div className="absolute inset-0 bg-cover bg-center opacity-10" style={{ backgroundImage: `url(${BG_OFFICE})` }}></div>
                        <div className="z-10 w-full max-w-6xl text-center">
                            <h2 className="text-5xl md:text-6xl font-black text-white tracking-widest mb-2 uppercase">Choose Your Employee</h2>
                            <p className="text-slate-400 mb-12 text-xl">Each role has different stats for the A2 Grammar Battles.</p>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                {CLASSES.map(c => (
                                    <GlassCard key={c.id} onClick={() => selectHero(c)} className="border-white/10 hover:border-[#0ea5e9] hover:-translate-y-2 transition-all cursor-pointer bg-[#1e293b]/90 flex flex-col items-center text-center p-8">
                                        <div className={`text-7xl mb-6 pixelated-emoji`}>{c.emoji}</div>
                                        <h3 className={`text-2xl font-black uppercase mb-3 ${c.color}`}>{c.name}</h3>
                                        <p className="text-slate-400 text-base mb-8 h-12">{c.desc}</p>
                                        <div className="w-full flex flex-col gap-3">
                                            {c.actions.map((act, i) => (
                                                <div key={i} className="bg-black/30 p-3 rounded-lg border border-white/5 text-sm font-mono text-slate-300 flex justify-between items-center uppercase">
                                                    <span><Icon name={act.type === 'attack' ? 'briefcase' : act.type === 'heal' ? 'coffee' : 'bolt'} className="mr-2 text-xs"/>{act.name}</span>

        const TeacherGuideSlide = ({ startLesson, toggleFs, isFs }) => (

                        <h3 className="text-lg font-bold text-white mb-2">Secret HUD</h3>

                    </GlassCard>

                <IconReg name="comment-dots" size={16}/> Let's Talk

                <GlassCard className="border-emerald-500/30 bg-emerald-900/10 inline-block px-12 py-6">
                <p className="text-emerald-400 font-bold uppercase tracking-widest text-sm mb-2">Speak Up</p>
                <p className="text-2xl text-slate-300 font-medium">{hint}</p>
                </GlassCard>
            </div>
        );

        const DilemmaSlide = ({ title = "The Dilemma", question, options, bgImage, onWin }) => {
            const [selected, setSelected] = useState(null);

            return (
                <div className="flex flex-col items-center justify-center h-full w-full max-w-6xl mx-auto p-8 animate-fadeIn relative text-center">
                <div className="absolute inset-0 z-0 bg-cover bg-center opacity-30 mix-blend-luminosity rounded-3xl overflow-hidden" style={{ backgroundImage: `url(${bgImage})` }}></div>
                <div className="absolute inset-0 bg-gradient-to-t from-[#0f172a] via-[#0f172a]/80 to-transparent z-0"></div>
                
                <div className="z-10 w-full flex flex-col items-center justify-center">
                    <h2 className="text-5xl md:text-7xl font-black mb-4 text-white uppercase tracking-tighter" style={{fontFamily: "'Arial Black', Impact, sans-serif"}}>{title}</h2>
                    <p className="text-2xl text-slate-300 mb-10 font-medium max-w-4xl mx-auto">{question}</p>
                    
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-5xl mx-auto mb-10 items-stretch">

                        onClick={() => { setSelected(i); onWin(100); }}
