                            ${selected === i ? 'border-[#0ea5e9] scale-105 shadow-[0_0_30px_rgba(14,165,233,0.4)]' : 'border-white/10 hover:border-white/40 hover:scale-105 bg-[#1e293b]/80 backdrop-blur-md'}`}
                        >
                        <div className={`absolute inset-0 bg-gradient-to-t transition-opacity ${selected === i ? 'from-[#0ea5e9]/80 to-transparent' : 'from-black/80 to-transparent opacity-0 group-hover:opacity-100'}`}></div>
                        <div className="relative z-10">
                            {selected === i && <IconReg name="circle-check" size={32} className="text-white mb-2" />}
                            <h3 className="text-3xl font-black text-white mb-1 uppercase tracking-tight">{opt.text}</h3>
                            <p className="text-slate-300 font-medium">{opt.sub}</p>
                        </div>
                        </div>
                    ))}
                    </div>

                    <div className="bg-transparent mt-4 inline-block mx-auto text-center w-full">
                    <p className="text-slate-500 uppercase tracking-widest text-xs font-bold mb-4 flex items-center justify-center gap-2"><IconReg name="comment-dots" size={16}/> Speaking Starters</p>
                    <div className="flex flex-wrap justify-center gap-4">
                        <button className="px-6 py-3 bg-[#1e293b] hover:bg-white hover:text-slate-900 border border-white/20 rounded-full font-bold transition-all shadow-lg text-slate-300">"If I were in this situation..."</button>
                        <button className="px-6 py-3 bg-[#1e293b] hover:bg-white hover:text-slate-900 border border-white/20 rounded-full font-bold transition-all shadow-lg text-slate-300">"I strongly believe that..."</button>
                        <button className="px-6 py-3 bg-[#1e293b] hover:bg-white hover:text-slate-900 border border-white/20 rounded-full font-bold transition-all shadow-lg text-slate-300">"To be honest, I'd..."</button>
                    </div>
                    </div>
                </div>
                </div>
            );
        };

        const VideoSlide = ({ title, start, end, mission, isCut = false }) => {
            const containerRef = useRef(null);
            const [isFullscreen, setIsFullscreen] = useState(false);

            useEffect(() => {
                const onChange = () => setIsFullscreen(!!document.fullscreenElement);
                document.addEventListener('fullscreenchange', onChange);
                return () => document.removeEventListener('fullscreenchange', onChange);
            }, []);

            const toggleFs = async () => {
                try {
                    if(!document.fullscreenElement && !isFullscreen) {
                        if (containerRef.current?.requestFullscreen) {
                            await containerRef.current.requestFullscreen();
                        } else {
                            setIsFullscreen(true);
                        }
                    } else {
                        if (document.exitFullscreen && document.fullscreenElement) {
                            await document.exitFullscreen();
                        } else {
                            setIsFullscreen(false);
                        }
                    }
                } catch(e) {
                    console.warn("Fullscreen permission denied.", e);
                    setIsFullscreen(!isFullscreen);
                }
            };

            const videoSrc = `https://www.youtube.com/embed/${YOUTUBE_ID}?start=${start}${end ? '&end='+end : ''}&rel=0&modestbranding=1&showinfo=0&autoplay=${isCut ? '1' : '0'}`;

            return (
                <div className="flex flex-col items-center justify-center h-full w-full max-w-5xl mx-auto p-8 animate-fadeIn text-center">
                    <div className="w-full flex justify-between items-end mb-4 max-w-5xl mx-auto">
                        <div className="text-left">
                            <h2 className="text-3xl font-black text-white uppercase tracking-tight">{title}</h2>
                            {isCut && <p className="text-[#0ea5e9] font-mono mt-1 text-sm bg-blue-900/30 px-2 py-1 rounded inline-block font-bold">TARGET CUT: {start}s {end ? `- ${end}s` : ''}</p>}
                        </div>
                        {mission && (
                            <div className="bg-blue-600/20 border border-[#0ea5e9] text-blue-100 px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 animate-pulse uppercase tracking-wide">
                            <Icon name="circle-exclamation" size={16} className="text-[#0ea5e9]"/> MISSION: {mission}
                            </div>
                        )}
                    </div>
                    <div ref={containerRef} className={`w-full max-w-5xl mx-auto bg-black rounded-2xl overflow-hidden shadow-2xl border border-white/10 relative group transition-all duration-300 
                        ${isFullscreen && !document.fullscreenElement ? 'fixed inset-0 z-[9999] rounded-none border-none flex items-center justify-center max-w-none' : ''} 
                        ${isCut && !isFullscreen ? 'aspect-[21/9]' : 'aspect-video'}`}>
                        
                        <iframe className={`absolute ${isFullscreen && !document.fullscreenElement ? 'w-full h-full max-w-[177vh]' : 'w-full h-full'}`} src={videoSrc} frameBorder="0" allow="autoplay; encrypted-media" allowFullScreen></iframe>
                        
                        <button onClick={toggleFs} className="absolute top-4 right-4 bg-black/80 hover:bg-[#0ea5e9] text-white px-4 py-2 rounded-xl transition-all z-10 flex items-center gap-2 backdrop-blur-md border border-white/20 shadow-2xl">
                            <Icon name={isFullscreen ? "compress" : "expand"} size={16} />
                            <span className="font-bold uppercase tracking-widest text-xs hidden sm:block">{isFullscreen ? "Exit" : "Fullscreen"}</span>
                        </button>
                    </div>
                </div>
            );
        };

        const SpotifyScriptSlide = ({ title, scriptLines }) => {
            const [activeIndex, setActiveIndex] = useState(null);

            return (
                <div className="flex flex-col md:flex-row h-full w-full max-w-7xl mx-auto p-8 gap-12 animate-fadeIn items-center relative">
                <div className="absolute inset-0 bg-[#0f172a]/90 backdrop-blur-2xl z-0 rounded-3xl shadow-2xl"></div>
                
                <div className="flex-1 w-full h-full flex flex-col justify-center relative z-10 overflow-hidden pl-8">
                    <div className="mb-8">
                    <h2 className="text-4xl font-black text-white uppercase tracking-tight mb-2">{title}</h2>
                    <p className="text-slate-400 flex items-center gap-2"><Icon name="book-open" size={18}/> Tap a script line to reveal its secrets.</p>
                    </div>
                    <div className="space-y-6 max-h-[60vh] overflow-y-auto pr-4 custom-scrollbar pb-20">
                    {scriptLines.map((line, idx) => (
                        <div 
                        key={idx}
                        onClick={() => setActiveIndex(idx)}
                        className={`cursor-pointer transition-all duration-300 transform 
                            ${activeIndex === idx 
                            ? 'text-white text-4xl md:text-5xl font-black scale-100' 
                            : 'text-slate-500 hover:text-slate-400 text-3xl md:text-4xl font-bold scale-95 origin-left'
                            }`}
                        >
                        {line.text}
                        </div>
                    ))}
                    </div>
                </div>

                <div className="w-full md:w-[450px] transition-all duration-500 z-10 pr-8">
                    {activeIndex !== null ? (
                    <div className="bg-[#1e293b] border border-white/10 rounded-[2rem] p-6 animate-slideInRight h-full flex flex-col justify-center shadow-2xl">
                        
                        <div className="flex flex-col items-center mb-6 text-center">
                        <span className="bg-[#0ea5e9] text-white text-xs font-bold px-3 py-1.5 rounded-md uppercase tracking-wider mb-4 shadow-md">Target Focus</span>
                        <h3 className="text-4xl font-black text-white capitalize leading-tight">{scriptLines[activeIndex].focus.word}</h3>
                        </div>
                        
                        <div className="bg-[#0f172a] rounded-xl p-5 mb-4 shadow-inner">
                        <p className="text-[#38bdf8] text-xs font-bold uppercase tracking-widest mb-2 flex items-center gap-2">
                            <Icon name="circle-info" size={14}/> Meaning / Rule
                        </p>
                        <p className="text-white text-lg font-medium">{scriptLines[activeIndex].focus.meaning}</p>
                        </div>

                        {scriptLines[activeIndex].focus.grammarNote && (
                        <div className="bg-[#1e293b] border-l-4 border-[#10b981] p-5 rounded-r-xl mb-4 shadow-inner">
                            <p className="text-[#10b981] text-xs font-bold uppercase tracking-widest mb-2">Grammar Check</p>
                            <p className="text-white text-md font-medium">{scriptLines[activeIndex].focus.grammarNote}</p>
                        </div>
                        )}

                        {scriptLines[activeIndex].focus.followUp && (
                        <div className="bg-[#1e293b] border-l-4 border-[#a855f7] p-5 rounded-r-xl shadow-inner mt-auto">
                            <p className="text-[#a855f7] text-xs font-bold uppercase tracking-widest mb-2 flex items-center gap-2">
                            <IconReg name="comment-dots" size={14}/> Follow-Up Question
                            </p>
                            <p className="text-white text-md font-bold italic">"{scriptLines[activeIndex].focus.followUp}"</p>
                        </div>
                        )}

                    </div>
                    ) : (
                    <div className="h-[450px] border-2 border-dashed border-white/10 rounded-[2rem] flex flex-col items-center justify-center text-slate-500 p-8 text-center bg-[#1e293b]/50">
                        <Icon name="magnifying-glass" size={48} className="mb-4 opacity-30" />
                        <p className="text-lg font-medium">Select a script line to open the deep analysis.</p>
                    </div>
                    )}
                </div>
                </div>
            );
        };

        const GrammarSlide = () => {
            const [mode, setMode] = useState('present'); 
            return (
                <div className="flex flex-col items-center justify-center h-full p-8 w-full max-w-6xl mx-auto animate-fadeIn text-center">
                <div className="bg-blue-600/20 text-blue-400 px-4 py-1 rounded-full text-sm font-bold tracking-widest mb-6 flex items-center justify-center gap-2 uppercase border border-blue-500/30 shadow-lg mx-auto w-max">
                    <Icon name="crosshairs" size={16}/> Grammar Detective
                </div>
                <h2 className="text-5xl md:text-6xl font-black mb-12 text-white uppercase tracking-tight">Regular vs Irregular</h2>

                <div className="flex flex-col md:flex-row w-full gap-8 items-stretch">
                    <div className="flex-1 flex flex-col gap-4">
                    <button onClick={() => setMode('present')} className={`flex-1 p-6 rounded-3xl border-2 transition-all duration-300 text-left flex flex-col justify-center gap-2 group ${mode === 'present' ? 'bg-blue-900/40 border-blue-500 shadow-[0_0_40px_rgba(59,130,246,0.2)]' : 'bg-[#1e293b] border-white/5 hover:border-white/20 hover:bg-[#334155]'}`}>
                        <span className="text-blue-400 font-bold uppercase tracking-widest text-xs">Step 1</span>
                        <span className="text-2xl font-black text-white uppercase tracking-tight group-hover:translate-x-2 transition-transform">Regular Verbs</span>
                        <span className="text-slate-400 font-medium">They follow the rules. Just add -ED.</span>
                    </button>

                    <button onClick={() => setMode('past')} className={`flex-1 p-6 rounded-3xl border-2 transition-all duration-300 text-left flex flex-col justify-center gap-2 group ${mode === 'past' ? 'bg-red-900/40 border-[#e23636] shadow-[0_0_40px_rgba(226,54,54,0.2)]' : 'bg-[#1e293b] border-white/5 hover:border-white/20 hover:bg-[#334155]'}`}>
                        <span className="text-[#e23636] font-bold uppercase tracking-widest text-xs">Step 2</span>
                        <span className="text-2xl font-black text-white uppercase tracking-tight group-hover:translate-x-2 transition-transform">Irregular Verbs</span>
                        <span className="text-slate-400 font-medium">They break the rules. You must memorize them.</span>
                    </button>
                    </div>

                    <div className="flex-[1.5] relative">
                    <GlassCard className="h-full flex flex-col justify-center text-left border-white/10 bg-[#1e293b]/90 p-10 shadow-2xl">
                        {mode === 'present' ? (
                        <div className="animate-slideInRight">
                            <div className="flex items-center gap-4 mb-8">
                            <div className="h-2 w-16 bg-blue-500 rounded-full animate-pulse shadow-[0_0_15px_rgba(59,130,246,0.8)]"></div>
                            <span className="text-blue-500 font-black text-xl tracking-widest">REGULAR VERBS (+ED)</span>
                            </div>
                            <h3 className="text-4xl md:text-5xl font-black text-white leading-tight mb-8">
                            "They <span className="text-blue-400 border-b-4 border-blue-500 pb-1">CHANGED</span> the computer clock."
                            </h3>
                            <div className="bg-blue-950/30 border-l-4 border-blue-500 p-6 rounded-r-2xl">
                            <p className="text-slate-300 text-lg leading-relaxed">Most verbs in English are regular. To talk about the past, we simply add <strong>-ED</strong> (Work &rarr; Worked, Play &rarr; Played, Change &rarr; Changed).</p>
                            </div>
                        </div>
                        ) : (
                        <div className="animate-slideInRight">
                            <div className="flex items-center gap-4 mb-8 relative">
                            <div className="h-2 w-16 bg-[#e23636] rounded-full animate-pulse shadow-[0_0_20px_rgba(226,54,54,0.8)]"></div>
                            <span className="text-[#e23636] font-black text-xl tracking-widest">IRREGULAR VERBS</span>
                            </div>
                            <h3 className="text-4xl md:text-5xl font-black text-white leading-tight mb-8">
                            "He <span className="text-[#e23636] border-b-4 border-[#e23636] pb-1">ATE</span> an entire pie and <span className="text-[#e23636] border-b-4 border-[#e23636] pb-1">FELL</span> asleep."
                            </h3>
                            <div className="bg-red-950/30 border-l-4 border-[#e23636] p-6 rounded-r-2xl">
                            <p className="text-slate-300 text-lg leading-relaxed">Some verbs change their form completely. There is no rule, you just have to learn them! (Eat &rarr; <strong>Ate</strong>, Fall &rarr; <strong>Fell</strong>, Have &rarr; <strong>Had</strong>).</p>
                            </div>
                        </div>
                        )}
                    </GlassCard>
                    </div>
                </div>
            </div>
            );
        };

        const QuizSlide = ({ question, options, answerIndex, explanation, followUp, onWin }) => {
            const [selected, setSelected] = useState(null);
            const isCorrect = selected === answerIndex;

            const handleSelect = (idx) => {
                if (selected !== null && isCorrect) return; 
                setSelected(idx);
                
                if (idx === answerIndex) {
                onWin(150);
                } else {
                setTimeout(() => setSelected(null), 1000);
                }
            };

            return (
                <div className="flex flex-col items-center justify-center h-full w-full p-8 text-center animate-fadeIn relative">
                    <div className="bg-orange-500/20 text-orange-400 px-4 py-1 rounded-full text-sm font-bold tracking-widest mb-6 flex items-center justify-center gap-2 uppercase mx-auto w-max">
                        <Icon name="gamepad" size={16}/> Knowledge Check
                    </div>
                    <h2 className="text-3xl md:text-5xl font-black text-white mb-10 uppercase tracking-tight leading-tight max-w-4xl mx-auto">{question}</h2>
                    
                    <div className="w-full max-w-4xl mx-auto flex flex-col items-stretch gap-6">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 w-full transition-all duration-500">
                            {options.map((opt, i) => {
                            let stateClass = "bg-[#1e293b] border-white/5 hover:bg-[#334155]";
                            if (selected !== null) {
                                if (i === answerIndex) stateClass = "bg-green-600 border-green-500";
                                else if (selected === i) stateClass = "bg-red-600 border-red-500 animate-shake";
                                else stateClass = "opacity-50";
                            }

                            return (
                                <button 
                                key={i} 
                                disabled={selected !== null && isCorrect}
                                onClick={() => handleSelect(i)}
                                className={`py-8 px-6 rounded-2xl border-2 font-bold text-xl md:text-2xl transition-all duration-300 text-white flex items-center justify-center ${stateClass}`}
                                >
                                {selected === i && i === answerIndex && <Icon name="check" size={24} className="mr-2" />}
                                {selected === i && i !== answerIndex && <Icon name="xmark" size={24} className="mr-2" />}
                                {opt}
                                </button>
                            )
                            })}
                        </div>

                        {isCorrect && explanation && (
                            <div className="w-full bg-gradient-to-br from-[#1e293b] to-[#0f172a] border border-green-500/30 rounded-3xl p-6 md:p-8 text-left animate-slideDown shadow-xl flex flex-col md:flex-row gap-8 items-stretch">
                                <div className="flex-1 flex flex-col justify-center">
                                    <p className="text-green-400 font-bold uppercase tracking-widest text-xs mb-3 flex items-center gap-2"><IconReg name="circle-check" size={14}/> Why is this correct?</p>
                                    <p className="text-slate-200 text-base md:text-lg leading-relaxed">{explanation}</p>
                                </div>
                                
                                <div className="w-px bg-white/10 hidden md:block"></div>
                                <div className="h-px w-full bg-white/10 md:hidden"></div>
                                
                                <div className="flex-1 flex flex-col justify-center">
                                    <p className="text-[#a855f7] font-bold uppercase tracking-widest text-xs mb-3 flex items-center gap-2"><IconReg name="comment-dots" size={14}/> Discussion</p>
                                    <p className="text-white text-xl md:text-2xl font-bold italic leading-tight">"{followUp}"</p>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const BuilderSlide = ({ words, onWin }) => {
            const [available, setAvailable] = useState([...words].sort(() => Math.random() - 0.5));
            const [built, setBuilt] = useState([]);
            const [status, setStatus] = useState('playing');

            const handleAdd = (w, originalIndex) => {
                if(status !== 'playing') return;
                const newBuilt = [...built, { word: w, id: Math.random() }]; 
                setBuilt(newBuilt);
                setAvailable(available.filter((_, i) => i !== originalIndex));

                if (newBuilt.length === words.length) {
                const builtSentence = newBuilt.map(item => item.word).join(" ");
                const correctSentence = words.join(" ");
                if (builtSentence === correctSentence) {
                    setStatus('won');
                    onWin(200);
                } else {
                    setStatus('lost');
                    setTimeout(() => {
                    setAvailable([...words].sort(() => Math.random() - 0.5));
                    setBuilt([]);
                    setStatus('playing');
                    }, 1500);
                }
                }
            };

            const handleRemove = (itemToRemove, indexInBuilt) => {
                if (status !== 'playing') return;
                const newBuilt = built.filter((_, i) => i !== indexInBuilt);
                setBuilt(newBuilt);
                setAvailable([...available, itemToRemove.word]);
            };

            return (
                <div className="flex flex-col items-center justify-center h-full w-full max-w-6xl mx-auto p-8 text-center animate-fadeIn relative">
                <div className="absolute inset-0 z-0 bg-cover bg-center opacity-20 mix-blend-luminosity rounded-3xl overflow-hidden" style={{ backgroundImage: `url(${BG_OFFICE})` }}></div>
                <div className="absolute inset-0 bg-[#0f172a]/80 z-0"></div>

                <div className="relative z-10 w-full flex flex-col items-center justify-center">
                    <div className="text-cyan-400 font-bold tracking-widest mb-4 flex items-center justify-center gap-2 uppercase">
                    <Icon name="bolt" size={16}/> Syntax Protocol
                    </div>
                    <h2 className="text-5xl md:text-7xl font-black text-white mb-12 uppercase tracking-tighter" style={{fontFamily: "'Arial Black', Impact, sans-serif"}}>
                    Rebuild the Memory
                    </h2>
                    
                    <div className={`min-h-[160px] w-full max-w-5xl bg-[#1e293b]/80 border-2 border-dashed rounded-3xl mb-12 flex items-center justify-center gap-4 p-8 flex-wrap transition-all duration-500 shadow-[0_0_30px_rgba(14,165,233,0.3)]
                    ${status === 'won' ? 'border-green-500 bg-green-900/20 shadow-[0_0_50px_rgba(34,197,94,0.3)]' : status === 'lost' ? 'border-[#e23636] bg-red-900/20 shadow-[0_0_50px_rgba(226,54,54,0.5)]' : 'border-white/10'}`}>
                    {built.map((item, i) => (
                        <div 
                        key={item.id} 
                        onClick={() => handleRemove(item, i)}
                        className="bg-white text-slate-900 px-8 py-4 rounded-xl font-black text-2xl md:text-3xl shadow-xl animate-pop uppercase cursor-pointer hover:bg-blue-100 hover:scale-105 transition-transform"
                        title="Click to remove"
                        >
                        {item.word}
                        </div>
                    ))}
                    {built.length === 0 && <span className="text-slate-500 text-2xl font-bold uppercase tracking-widest">Tap words below to build the sentence...</span>}
                    </div>

                    <div className="flex flex-wrap gap-4 justify-center max-w-4xl">
                    {available.map((w, i) => (
                        <button 
                        key={i} 
                        onClick={() => handleAdd(w, i)} 
                        className="bg-[#334155] hover:bg-[#475569] text-white px-8 py-4 rounded-xl font-bold text-2xl active:scale-95 transition-all hover:-translate-y-1 uppercase shadow-lg"
                        >
                        {w}
                        </button>
                    ))}
                    </div>
                </div>
                </div>
            );
        };

        const DebateSlide = ({ title, question, vocabHints }) => (
            <div className="flex flex-col items-center justify-center h-full w-full max-w-6xl mx-auto p-8 animate-fadeIn">
                <div className="bg-red-600/20 text-[#e23636] px-4 py-1 rounded-full text-sm font-bold tracking-widest mb-6 flex items-center gap-2 uppercase border border-[#e23636]/30 shadow-lg">
                <IconReg name="comment-dots" size={16}/> The Verdict
                </div>
                <h2 className="text-5xl md:text-7xl font-black mb-8 text-white uppercase tracking-tighter text-center" style={{fontFamily: "'Arial Black', Impact, sans-serif"}}>{title}</h2>
                <p className="text-2xl text-slate-300 font-medium text-center mb-12 max-w-4xl">{question}</p>
                
                <GlassCard className="w-full bg-[#1e293b]/90 border border-white/10 p-10 flex flex-col items-center shadow-2xl">
                <p className="text-slate-400 uppercase tracking-widest text-sm font-bold mb-6 flex items-center gap-2"><Icon name="star" size={16} className="text-yellow-500"/> Challenge: Use these words in your answer</p>
                <div className="flex flex-wrap justify-center gap-4">
                    {vocabHints.map((hint, i) => (
                    <span key={i} className="px-6 py-3 bg-[#334155] border border-white/5 rounded-xl text-white font-bold text-xl hover:border-[#e23636] hover:text-[#e23636] transition-all cursor-default shadow-lg">
                        {hint}
                    </span>
                    ))}
                </div>
                </GlassCard>
            </div>
        );

        const ShadowingIntroSlide = () => (
            <div className="flex flex-col items-center justify-center h-full w-full max-w-6xl mx-auto p-8 animate-fadeIn">
                <div className="bg-purple-600/20 text-purple-400 px-4 py-1 rounded-full text-sm font-bold tracking-widest mb-4 flex items-center gap-2 uppercase">
                <Icon name="microphone" size={16}/> Fluency Protocol
                </div>
                <h2 className="text-6xl font-black mb-4 text-white text-center uppercase tracking-tight">The Shadowing Method</h2>
                <p className="text-2xl text-slate-400 mb-16 text-center max-w-3xl">To speak like a native, you must practice muscle memory. Stop thinking. Start imitating.</p>
                
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 w-full">
                <GlassCard className="text-center py-12 border-t-4 border-t-blue-500 bg-[#1e293b]/90">
                    <Icon name="headphones" size={56} className="mx-auto text-blue-400 mb-6" />
                    <h3 className="text-3xl font-black text-white mb-4 uppercase">1. Listen</h3>
                    <p className="text-slate-400 text-lg">Focus entirely on the rhythm, intonation, and connected speech.</p>
                </GlassCard>
                <GlassCard className="text-center py-12 border-t-4 border-t-yellow-500 bg-[#1e293b]/90">
                    <IconReg name="comment-dots" size={56} className="mx-auto text-yellow-400 mb-6" />
                    <h3 className="text-3xl font-black text-white mb-4 uppercase">2. Mumble</h3>
                    <p className="text-slate-400 text-lg">Play the audio and whisper along. Match the exact speed.</p>
                </GlassCard>
                <GlassCard className="text-center py-12 border-t-4 border-t-purple-500 bg-purple-900/20">
                    <Icon name="microphone" size={56} className="mx-auto text-purple-400 mb-6" />
                    <h3 className="text-3xl font-black text-white mb-4 uppercase">3. Perform</h3>
                    <p className="text-slate-400 text-lg">Speak out loud at the <strong>exact same time</strong> as the actor.</p>
                </GlassCard>
                </div>
            </div>
        );

        const ShadowingStudioSlide = ({ title, phrase, connectedSpeech, start, end, onComplete }) => {
            const [phase, setPhase] = useState(1);
            const [isPerforming, setIsPerforming] = useState(false);
            const containerRef = useRef(null);
            const [isFullscreen, setIsFullscreen] = useState(false);

            useEffect(() => {
                const onChange = () => setIsFullscreen(!!document.fullscreenElement);
                document.addEventListener('fullscreenchange', onChange);
                return () => document.removeEventListener('fullscreenchange', onChange);
            }, []);

            const toggleFs = async () => {
                try {
                    if(!document.fullscreenElement && !isFullscreen) {
                        if (containerRef.current?.requestFullscreen) {
                            await containerRef.current.requestFullscreen();
                        } else {
                            setIsFullscreen(true);
                        }
                    } else {
                        if (document.exitFullscreen && document.fullscreenElement) {
                            await document.exitFullscreen();
                        } else {
                            setIsFullscreen(false);
                        }
                    }
                } catch(e) {
                    console.warn("Fullscreen permission denied.", e);
                    setIsFullscreen(!isFullscreen);
                }
            };

            const handlePerform = () => {
                setIsPerforming(true);
                setTimeout(() => {
                setIsPerforming(false);
                setPhase(4); 
                onComplete(300);
                }, 4000); 
            };

            const videoSrc = `https://www.youtube.com/embed/${YOUTUBE_ID}?start=${start || 0}${end ? '&end='+end : ''}&rel=0&modestbranding=1&showinfo=0`;

            return (
                <div className="flex flex-col items-center justify-center h-full w-full max-w-7xl mx-auto p-8 animate-fadeIn text-center">
                <div className="bg-purple-600/20 text-purple-400 px-4 py-1 rounded-full text-sm font-bold tracking-widest mb-6 border border-purple-500/30 flex items-center justify-center gap-2 uppercase mx-auto w-max">
                    <Icon name="microphone" size={16}/> Shadowing Studio
                </div>
                <h2 className="text-4xl md:text-5xl font-black text-white mb-8 uppercase tracking-tight">{title}</h2>
                
                <div className="flex flex-col md:flex-row w-full gap-8 items-stretch mb-8 h-full max-h-[500px]">
                    <div ref={containerRef} className={`w-full md:w-1/2 bg-black overflow-hidden shadow-2xl border-2 border-purple-500/30 relative group flex items-center justify-center transition-all duration-300 ${isFullscreen && !document.fullscreenElement ? 'fixed inset-0 z-[9999] w-full h-full md:w-full border-none rounded-none' : 'rounded-3xl'}`}>
                        <div className="w-full aspect-video relative mx-auto">
                            <iframe className="absolute w-full h-full" src={videoSrc} frameBorder="0" allow="autoplay; encrypted-media" allowFullScreen></iframe>
                        </div>
                        <button onClick={toggleFs} className="absolute top-4 right-4 bg-black/80 hover:bg-[#0ea5e9] text-white px-4 py-2 rounded-xl transition-all z-10 flex items-center gap-2 backdrop-blur-md border border-white/20 shadow-2xl">
                            <Icon name={isFullscreen ? "compress" : "expand"} size={16} />
                            <span className="font-bold uppercase tracking-widest text-xs hidden sm:block">{isFullscreen ? "Exit" : "Fullscreen"}</span>
                        </button>
                    </div>

                    <div className="w-full md:w-1/2 flex flex-col justify-center gap-6">
                        <GlassCard className={`w-full text-center py-12 flex flex-col justify-center flex-1 transition-all duration-500 border-2 ${isPerforming ? 'border-purple-500 shadow-[0_0_50px_rgba(168,85,247,0.4)] scale-[1.02]' : 'border-white/5'}`}>
                            <h3 className={`text-3xl md:text-5xl font-black mb-6 uppercase tracking-tighter transition-colors ${isPerforming ? 'text-white' : 'text-slate-300'}`}>"{phrase}"</h3>
                            <p className="text-xl text-purple-400 font-mono bg-[#0f172a] inline-block px-6 py-3 rounded-2xl border border-purple-500/30 font-bold mx-auto w-max">
                            Sounds like: {connectedSpeech}
                            </p>
                        </GlassCard>

                        <div className="grid grid-cols-3 gap-4 w-full">
                            <Button onClick={() => setPhase(2)} className={`py-4 text-sm md:text-base ${phase >= 1 ? 'border-purple-500/50 bg-purple-900/30' : 'bg-[#1e293b]'}`}>
                                <Icon name="volume-high" size={20} /> 1. MUMBLE
                            </Button>
                            <Button onClick={() => setPhase(3)} disabled={phase < 2} className={`py-4 text-sm md:text-base ${phase >= 2 ? 'border-purple-500/50 bg-purple-900/30' : 'bg-[#1e293b]'}`}>
                                <Icon name="bolt" size={20} /> 2. SHADOW
                            </Button>
                            <Button onClick={handlePerform} disabled={phase < 3 || isPerforming || phase === 4} primary={phase === 3} className={`py-4 text-sm md:text-base ${isPerforming ? 'bg-purple-600 animate-pulse' : ''} ${phase === 4 ? '!bg-green-600' : ''}`}>
                                {isPerforming ? <><Icon name="microphone" size={20} className="animate-bounce" /> GO!</> : phase === 4 ? <><Icon name="star" size={20} /> NATIVE!</> : <><Icon name="microphone" size={20} /> 3. SOLO</>}
                            </Button>
                        </div>
                    </div>
                </div>
                </div>
            );
        };

        const MatchPairsSlide = ({ pairs, onWin }) => {
            const [selectedLeft, setSelectedLeft] = useState(null);
            const [selectedRight, setSelectedRight] = useState(null);
            const [matched, setMatched] = useState([]);
            
            const leftCol = pairs.map((p, i) => ({ id: i, text: p.left }));
            const rightIndices = [3, 0, 2, 1]; 
            const rightCol = rightIndices.map(i => ({ id: i, text: pairs[i].right }));

            useEffect(() => {
                if (selectedLeft !== null && selectedRight !== null) {
                if (selectedLeft === selectedRight) {
                    const newMatched = [...matched, selectedLeft];
                    setMatched(newMatched);
                    setSelectedLeft(null);
                    setSelectedRight(null);
                    if (newMatched.length === pairs.length) onWin(400);
                } else {
                    setTimeout(() => { setSelectedLeft(null); setSelectedRight(null); }, 800);
                }
                }
            }, [selectedLeft, selectedRight]);

            return (
                <div className="flex flex-col items-center justify-center h-full w-full max-w-6xl mx-auto p-8 animate-fadeIn relative text-center">
                <div className="bg-emerald-600/20 text-emerald-400 px-4 py-1 rounded-full text-sm font-bold mb-6 border border-emerald-500/30 flex items-center justify-center gap-2 uppercase tracking-widest mx-auto w-max">
                    <Icon name="bolt" size={16}/> Neural Link Game
                </div>
                <h2 className="text-5xl font-black text-white mb-2 uppercase tracking-tight">Connect the Meaning</h2>
                <p className="text-xl text-slate-400 mb-12">Tap the present verb on the left, then its past form on the right.</p>

                <div className="flex w-full gap-8 md:gap-16">
                    <div className="flex-1 flex flex-col gap-6">
                    {leftCol.map(item => {
                        const isMatched = matched.includes(item.id);
                        const isSelected = selectedLeft === item.id;
                        const isError = selectedLeft !== null && selectedRight !== null && selectedLeft === item.id && selectedLeft !== selectedRight;
                        return (
                        <GlassCard key={`l-${item.id}`} onClick={() => !isMatched && setSelectedLeft(item.id)}
                            className={`py-8 text-center font-black text-2xl uppercase tracking-wide transition-all duration-300 bg-[#1e293b] border-white/5
                            ${isMatched ? 'opacity-0 scale-90 pointer-events-none' : ''}
                            ${isSelected ? 'bg-emerald-600/30 border-emerald-500 scale-105 shadow-[0_0_30px_rgba(16,185,129,0.3)]' : ''}
                            ${isError ? 'bg-red-600/30 border-[#e23636] animate-shake' : 'hover:border-white/30'}`}>{item.text}</GlassCard>
                        );
                    })}
                    </div>
                    <div className="flex-1 flex flex-col gap-6">
                    {rightCol.map(item => {
                        const isMatched = matched.includes(item.id);
                        const isSelected = selectedRight === item.id;
                        const isError = selectedLeft !== null && selectedRight !== null && selectedRight === item.id && selectedLeft !== selectedRight;
                        return (
                        <GlassCard key={`r-${item.id}`} onClick={() => !isMatched && setSelectedRight(item.id)}
                            className={`py-8 text-center font-medium text-xl text-slate-300 transition-all duration-300 bg-[#1e293b] border-white/5
                            ${isMatched ? 'opacity-0 scale-90 pointer-events-none' : ''}
                            ${isSelected ? 'bg-emerald-600/30 border-emerald-500 scale-105 shadow-[0_0_30px_rgba(16,185,129,0.3)]' : ''}
                            ${isError ? 'bg-red-600/30 border-[#e23636] animate-shake' : 'hover:border-white/30'}`}>{item.text}</GlassCard>
                        );
                    })}
                    </div>
                </div>
                
                {matched.length === pairs.length && (
                    <div className="absolute inset-0 flex flex-col items-center justify-center bg-[#0f172a]/90 backdrop-blur-md z-50 animate-fadeIn rounded-3xl">
                    <Icon name="trophy" size={120} className="text-yellow-400 mb-8 animate-bounce drop-shadow-[0_0_50px_rgba(250,204,21,0.5)]" />
                    <h2 className="text-7xl font-black text-white mb-4 uppercase tracking-tighter" style={{fontFamily: "'Arial Black', Impact, sans-serif"}}>SYSTEM CLEARED!</h2>
                    <p className="text-emerald-400 font-black text-4xl">+400 XP</p>
                    </div>
                )}
                </div>
            );
        };

        const SpeakingArenaSlide = () => {
            return (
                <div className="flex flex-col items-center justify-center h-full w-full max-w-7xl mx-auto p-8 animate-fadeIn text-center">
                <div className="bg-red-600/20 text-[#e23636] px-4 py-1 rounded-full text-sm font-bold mb-4 flex items-center justify-center gap-2 uppercase tracking-widest mx-auto w-max border border-[#e23636]/30">
                    <Icon name="user-ninja" size={16}/> Final Challenge
                </div>
                <h2 className="text-6xl font-black text-white mb-2 uppercase tracking-tighter" style={{fontFamily: "'Arial Black', Impact, sans-serif"}}>The Speaking Arena</h2>
                <p className="text-xl text-slate-400 mb-10 max-w-3xl mx-auto">Pair up. It's time for the ultimate office roleplay.</p>

                <div className="flex flex-col md:flex-row w-full gap-8 items-stretch">
                    <div className="flex-1 bg-gradient-to-br from-blue-900/40 to-[#1e293b] border-t-4 border-t-blue-500 rounded-3xl p-8 relative overflow-hidden shadow-2xl flex flex-col items-center justify-center text-center">
                    <div className="absolute top-4 right-4 text-6xl opacity-50">💼</div>
                    <h3 className="text-3xl font-black text-white mb-6 uppercase">Actor A: Jim</h3>
                    <p className="text-slate-300 text-lg mb-6 leading-relaxed">
                        You want to leave work early. You changed the clocks to trick your boss. Defend your plan!
                    </p>
                    <div className="bg-black/50 p-4 rounded-xl border border-white/5 w-full">
                        <p className="text-blue-400 font-bold uppercase text-xs mb-2">Must use:</p>
                        <ul className="text-white font-medium space-y-2">
                        <li>"It is already 5 PM."</li>
                        <li>"We need to be very quiet."</li>
                        </ul>
                    </div>
                    </div>

                    <div className="flex-none flex items-center justify-center font-black text-6xl italic text-slate-700">VS</div>

                    <div className="flex-1 bg-gradient-to-br from-orange-900/40 to-[#1e293b] border-t-4 border-t-orange-500 rounded-3xl p-8 relative overflow-hidden shadow-2xl flex flex-col items-center justify-center text-center">
                    <div className="absolute top-4 right-4 text-6xl opacity-50">🥱</div>
                    <h3 className="text-3xl font-black text-white mb-6 uppercase">Actor B: Michael</h3>
                    <p className="text-slate-300 text-lg mb-6 leading-relaxed">
                        You just woke up. You are very confused about the time. Ask what happened.
                    </p>
                    <div className="bg-black/50 p-4 rounded-xl border border-white/5 w-full">
                        <p className="text-orange-400 font-bold uppercase text-xs mb-2">Must use:</p>
                        <ul className="text-white font-medium space-y-2">
                        <li>"Did I fall asleep?"</li>
                        <li>"What time is it?"</li>
                        </ul>
                    </div>
                    </div>
                </div>
                </div>
            );
        };

        // ==========================================
        // 📚 EXACT 25-PAGE LESSON STRUCTURE (The Office A2)
        // ==========================================

        const SLIDES_DATA = [
            { type: "intro", tip: "Welcome to The Office A2 Lesson. Start by asking students if they have ever fallen asleep at work or school." }, 
            { type: "vocabFocus", word: "Fell asleep", emoji: "😴", definition: "To start sleeping. (Past form of 'fall asleep').", followUp: "Have you ever fallen asleep during a movie?", starters: ["Yes, last week!", "Only if it's boring", "Never"], tip: "Highlight that it's irregular (Fall -> Fell)." }, 
            { type: "vocabFocus", word: "Change", emoji: "⌚", definition: "To make something different or alter it.", followUp: "When was the last time you changed your hairstyle?", starters: ["A long time ago", "Recently", "I never change it"], tip: "Highlight that it's regular (Change -> Changed)." }, 
            { type: "vocabFocus", word: "Appointment", emoji: "📅", definition: "An arrangement to meet someone at a particular time and place.", followUp: "What is the worst appointment you ever had?", starters: ["The dentist", "A job interview", "A terrible date"], tip: "Make sure they pronounce it correctly (no 'e' sound at the end)." }, 
            { type: "dilemma", title: "The Dilemma", question: "Your boss falls asleep at his desk at 3 PM. What do you do?", options: [{ text: "WAKE HIM UP", sub: "Be a good employee." }, { text: "CHANGE THE CLOCK", sub: "Trick him so you can leave early." }, { text: "GO HOME QUIETLY", sub: "Leave him there." }], bgImage: BG_OFFICE, tip: "Read the dilemma. Discuss what the students would realistically do." }, 
            
            // --- CHUNK 1: The Setup ---
            { type: "video", title: "Part 1: The Setup", start: 0, end: 64, mission: "Watch the first part. What excuse does Dwight invent?", isCut: true, tip: "Play the first chunk. They will set up the prank." }, 
            { type: "spotifyScript", title: "Script Analysis: PT 1", 
                scriptLines: [
                { text: "Michael had an entire family-sized chicken pot pie for lunch...", focus: { word: "Had", meaning: "Past tense of HAVE. Here it means 'ate'.", grammarNote: "In English, we say 'have lunch', so the past is 'had lunch'.", followUp: "What did you have for lunch yesterday?"} },
                { text: "...and then he promptly fell asleep.", focus: { word: "Fell", meaning: "Past tense of FALL.", grammarNote: "To 'fall asleep' means to start sleeping.", followUp: "Are you a person who falls asleep quickly?"} },
                { text: "I'm gonna go in there and change the computer.", focus: { word: "Change", meaning: "To make something different.", grammarNote: "This is a regular verb in the past: Changed.", followUp: "What is something you would like to change in your city?"} },
                { text: "I have an appointment with the horse doctor.", focus: { word: "Horse Doctor", meaning: "A veterinarian for horses.", grammarNote: "A funny, unusual thing for an office worker to say.", followUp: "What is the strangest excuse you ever used to leave early?"} }
                ], tip: "Review the key sentences from Part 1."
            },
            { type: "grammar", tip: "Toggle between Regular and Irregular verbs to explain the Past Simple." }, 
            { type: "builder", words: ["Michael", "ate", "a", "pie", "and", "fell", "asleep."], tip: "Syntax practice. Have the class shout the correct order." }, 
            
            // --- CHUNK 2: The Escape ---
            { type: "video", title: "Part 2: The Escape", start: 65, end: 106, mission: "What time is it on Michael's watch when he wakes up?", isCut: true, tip: "Play the final part of the prank." }, 
            { type: "spotifyScript", title: "Script Analysis: PT 2", 
                scriptLines: [
                { text: "How that horse became a doctor, I don't know.", focus: { word: "Became", meaning: "Past tense of BECOME.", grammarNote: "Irregular verb. He is making a joke that the horse is the doctor.", followUp: "Do you like Dad Jokes?"} },
                { text: "He's just a regular doctor who shoots your horse in the head...", focus: { word: "Shoots", meaning: "Fires a gun.", grammarNote: "Dark comedy element of The Office.", followUp: "Is dark humor popular in your country?"} }
                ], tip: "Explain why the joke is funny (wordplay on 'horse doctor')."
            },
            { type: "shadowIntro", tip: "Explain the gym analogy: speaking requires muscle memory." }, 
            { type: "shadowing", title: "Speak like Dwight", phrase: "I have an appointment with the horse doctor.", connectedSpeech: "I hav-an-appointment with the horse doctor.", start: 45, end: 49, tip: "Watch the video loop. Then use the buttons to Mumble, Shadow, and Perform." }, 
            { type: "match", pairs: [
                { left: "Eat", right: "Ate" },
                { left: "Have", right: "Had" },
                { left: "Fall", right: "Fell" },
                { left: "Change", right: "Changed" }
                ], tip: "Memory test! Match the base form to the past form." 
            },
            
            // --- CONSOLIDATION & RPG ---
            { type: "video", title: "The Final Watch", start: 0, end: 106, mission: "Watch the full scene and enjoy the comedy!", tip: "Let the full scene play. It brings all the pieces together." }, 
            { type: "quiz", question: "What is the correct past tense of 'FALL'?", options: ["Falled", "Fell", "Fallen", "Fall"], answerIndex: 1, explanation: "Fall is an irregular verb. The past simple is 'Fell'.", followUp: "Did you fall down a lot when you were a kid?", tip: "A quick check." }, 
            { type: "quiz", question: "What is an 'appointment'?", options: ["A type of pie.", "A scheduled meeting at a specific time.", "A broken clock.", "A funny joke."], answerIndex: 1, explanation: "An appointment is an arrangement to meet someone, usually professional (doctor, dentist, boss).", followUp: "Do you have any appointments this week?", tip: "Check vocabulary comprehension." }, 
            { type: "discussion", question: "Have you ever used a crazy excuse to miss work or school?", hint: "Use Past Simple: 'I said that I had...'", tip: "Open the Whiteboard to type out their sentences live." },
            
            // --- BOSS FIGHT ---
            { type: "rpg", tip: "O Boardgame: Corporate Battle. The Ultimate Test! Deixe os alunos escolherem a classe e lutarem contra o escritório!" },
            
            // --- OUTRO & ROLEPLAY ---
            { type: "debate", title: "Office Pranks", question: "Is it okay to play pranks on your boss if he is lazy?", vocabHints: ["Promptly", "Appointment", "Change", "Fell asleep"], tip: "Encourage them to use the vocabulary boxes. Use the Timer tool for 60s per student." }, 
            { type: "speakingArena", tip: "Put two students on the spot. Use the Timer tool to give them 60 seconds to act it out." }, 
            { type: "end", tip: "Show the final XP. Tell them to click 'My Homework' on their student dashboard." } 
        ];

        // --- MAIN APPLICATION ---
        function App() {
            const [started, setStarted] = useState(false);
            const [slideIdx, setSlideIdx] = useState(0);
            const [xp, setXp] = useState(0);
            const [hud, setHud] = useState(false);
            const [completed, setCompleted] = useState(new Set());
            const [isAppFullscreen, setIsAppFullscreen] = useState(false);

            useEffect(() => {
                const handleFsChange = () => setIsAppFullscreen(!!document.fullscreenElement);
                document.addEventListener('fullscreenchange', handleFsChange);
                return () => document.removeEventListener('fullscreenchange', handleFsChange);
            }, []);

            const toggleAppFullscreen = async () => {
                try {
                    if (!document.fullscreenElement && !isAppFullscreen) {
                        if (document.documentElement.requestFullscreen) {
                            await document.documentElement.requestFullscreen();
                        } else {
                            setIsAppFullscreen(true);
                        }
                    } else {
                        if (document.exitFullscreen && document.fullscreenElement) {
                            await document.exitFullscreen();
                        } else {
                            setIsAppFullscreen(false);
                        }
                    }
                } catch (e) {
                    console.warn("Fullscreen API not allowed here:", e);
                    setIsAppFullscreen(!isAppFullscreen);
                }
            };

            const addXp = (amount) => {
                setXp(x => x + amount);
                if (!completed.has(slideIdx) && amount !== 50) {
                setCompleted(prev => new Set(prev).add(slideIdx));
                }
            };

            const next = () => { if (slideIdx < SLIDES_DATA.length - 1) setSlideIdx(s => s + 1); };
            const prev = () => { if (slideIdx > 0) setSlideIdx(s => s - 1); };

            if (!started) {
                return (
                    <div className={`w-full bg-[#0f172a] font-sans overflow-hidden flex flex-col relative selection:bg-[#0ea5e9]/30 text-white ${isAppFullscreen && !document.fullscreenElement ? 'fixed inset-0 z-[9999] h-[100dvh] w-screen' : 'h-screen'}`}>
                        <div className="fixed top-6 right-6 z-[60] flex items-center gap-3">
                            <button onClick={toggleAppFullscreen} className={`w-14 h-14 rounded-full flex items-center justify-center transition-all shadow-2xl ${isAppFullscreen ? 'bg-[#1e293b]/80 text-[#0ea5e9] border-[#0ea5e9] shadow-[0_0_20px_rgba(14,165,233,0.3)]' : 'bg-[#1e293b]/80 backdrop-blur-md text-slate-400 border-white/10 hover:text-white hover:border-white/30 hover:scale-105'}`} title="Toggle Fullscreen">
                                <Icon name={isAppFullscreen ? "compress" : "expand"} size={24} />
                            </button>
                        </div>
                        <TeacherGuideSlide startLesson={() => setStarted(true)} toggleFs={toggleAppFullscreen} isFs={isAppFullscreen} />
                    </div>
                );
            }

            const current = SLIDES_DATA[slideIdx];

            const renderSlide = () => {
                switch (current.type) {
                case "intro": return <CoverSlide nextSlide={next} />;
                case "vocabFocus": return <VocabFocusSlide word={current.word} emoji={current.emoji} definition={current.definition} followUp={current.followUp} starters={current.starters} />;
                case "discussion": return <DiscussionSlide question={current.question} hint={current.hint} />;
                case "debate": return <DebateSlide title={current.title} question={current.question} vocabHints={current.vocabHints} />;
                case "dilemma": return <DilemmaSlide title={current.title} question={current.question} options={current.options} bgImage={current.bgImage} onWin={addXp} />;
                case "video": return <VideoSlide title={current.title} start={current.start} end={current.end} mission={current.mission} isCut={current.isCut} />;
                case "spotifyScript": return <SpotifyScriptSlide title={current.title} scriptLines={current.scriptLines} />;
                case "grammar": return <GrammarSlide />;
                case "builder": return <BuilderSlide words={current.words} onWin={addXp} />;
                case "quiz": return <QuizSlide question={current.question} options={current.options} answerIndex={current.answerIndex} explanation={current.explanation} followUp={current.followUp} onWin={addXp} />;
                case "shadowIntro": return <ShadowingIntroSlide />;
                case "shadowing": return <ShadowingStudioSlide title={current.title} phrase={current.phrase} connectedSpeech={current.connectedSpeech} start={current.start} end={current.end} onComplete={addXp} />;
                case "match": return <MatchPairsSlide pairs={current.pairs} onWin={addXp} />;
                case "speakingArena": return <SpeakingArenaSlide />;
                case "rpg": return <OfficeBattleRPG addXp={addXp} onComplete={next} />;
                case "end":
                    return (
                    <div className="flex flex-col items-center justify-center h-full w-full max-w-6xl mx-auto text-center p-8 animate-fadeIn">
                        <Icon name="trophy" size={120} className="text-yellow-400 mb-8 drop-shadow-[0_0_50px_rgba(250,204,21,0.6)] animate-bounce" />
                        <h1 className="text-7xl md:text-9xl font-black mb-6 text-white uppercase tracking-tighter" style={{fontFamily: "'Arial Black', Impact, sans-serif"}}>EPISODE COMPLETE</h1>
                        <GlassCard className="mb-12 bg-[#0ea5e9]/10 border-[#0ea5e9]/30 px-20 py-10 inline-block shadow-[0_0_60px_rgba(14,165,233,0.15)]">
                        <p className="text-[#0ea5e9] font-bold uppercase tracking-widest text-lg mb-2">Total XP Earned</p>
                        <p className="text-8xl font-black text-white">{xp} XP</p>
                        </GlassCard>
                        <div className="flex items-center justify-center gap-6">
                        <Button variant="netflix-white" className="px-10 py-5 text-xl uppercase tracking-wider">
                            <Icon name="play" size={24} className="text-slate-900" /> Watch Next Episode
                        </Button>
                        <Button variant="netflix-dark" className="px-10 py-5 text-xl uppercase tracking-wider">
                            <Icon name="plus" size={24} /> Access Homework
                        </Button>
                        </div>
                    </div>
                    );
                default: return <div className="text-white text-2xl">Error loading module.</div>;
                }
            };

            return (
                <div className={`w-full bg-[#0f172a] font-sans overflow-hidden flex flex-col relative selection:bg-[#0ea5e9]/30 text-white ${isAppFullscreen && !document.fullscreenElement ? 'fixed inset-0 z-[9999] h-[100dvh] w-screen' : 'h-screen'}`}>
                
                <div className="fixed top-6 right-6 z-[60] flex items-center gap-3">
                    {slideIdx > 0 && (
                        <React.Fragment>
                            <div className="flex items-center gap-2 bg-[#1e293b]/80 border border-white/10 px-5 h-14 rounded-full backdrop-blur-md shadow-lg mr-2">
                                <Icon name="star" size={18} className="text-yellow-400" />
                                <span className="font-bold text-yellow-400 text-lg">{xp} XP</span>
                            </div>
                            <button onClick={() => setHud(!hud)} className={`w-14 h-14 rounded-full border transition-all shadow-2xl flex items-center justify-center ${hud ? 'bg-[#0ea5e9] text-white border-transparent shadow-[0_0_20px_rgba(14,165,233,0.5)]' : 'bg-[#1e293b]/80 backdrop-blur-md text-slate-400 border-white/10 hover:text-white hover:border-white/30 hover:scale-105'}`} title="Toggle HUD">
                                {hud ? <Icon name="eye" size={24} /> : <Icon name="eye-slash" size={24} />}
                            </button>
                        </React.Fragment>
                    )}
                    <button onClick={toggleAppFullscreen} className={`w-14 h-14 rounded-full border transition-all shadow-2xl flex items-center justify-center ${isAppFullscreen ? 'bg-[#1e293b]/80 text-[#0ea5e9] border-[#0ea5e9] shadow-[0_0_20px_rgba(14,165,233,0.3)]' : 'bg-[#1e293b]/80 backdrop-blur-md text-slate-400 border-white/10 hover:text-white hover:border-white/30 hover:scale-105'}`} title="Toggle Fullscreen">
                        <Icon name={isAppFullscreen ? "compress" : "expand"} size={24} />
                    </button>
                </div>

                {started && <TeacherTools addXp={addXp} />}

                {/* Dynamic Background Image */}
                {slideIdx > 0 && (
                    <div 
                    className="absolute inset-0 z-0 bg-cover bg-center opacity-10 mix-blend-luminosity transition-all duration-1000 scale-105" 
                    style={{ backgroundImage: `url(${slideIdx > 13 ? BG_CLOCK : BG_OFFICE})` }} 
                    />
                )}
                
                {/* Top Header Navigation */}
                {slideIdx > 0 && (
                    <div className="z-30 w-full p-6 flex justify-between items-center bg-gradient-to-b from-[#0f172a] via-[#0f172a]/80 to-transparent absolute top-0 pointer-events-none">
                    <h1 className="text-white font-black tracking-widest text-xl drop-shadow-md flex items-center gap-3 ml-24 pointer-events-auto">
                        <div className="w-8 h-8 bg-[#0ea5e9] text-white flex items-center justify-center text-lg shadow-[0_0_15px_rgba(14,165,233,0.5)]">W</div>
                        <span className="opacity-80 hidden md:block">WOLFFLIX</span>
                    </h1>
                    </div>
                )}

                {/* Teacher HUD Alert */}
                {hud && current.tip && slideIdx > 0 && (
                    <div className="absolute top-24 left-1/2 transform -translate-x-1/2 z-[40] bg-[#1e293b]/95 backdrop-blur-2xl border border-blue-500/50 text-blue-50 px-6 py-4 rounded-2xl shadow-2xl flex items-center justify-center text-center gap-4 w-[90%] max-w-2xl animate-slideInDown">
                    <div className="bg-blue-600/20 p-2 rounded-full border border-blue-500/30"><Icon name="display" size={24} className="text-blue-400" /></div>
                    <div>
                        <p className="text-xs text-blue-400 font-bold uppercase tracking-widest mb-1">Director's Note</p>
                        <p className="font-medium text-[15px]">{current.tip}</p>
                    </div>
                    </div>
                )}

                {/* Main Slide Renderer Area */}
                <div className="flex-1 relative z-10 w-full h-full overflow-y-auto overflow-x-hidden pt-16 pb-24 flex items-center justify-center">
                    {renderSlide()}
                </div>

                {/* Footer / Progression Controls */}
                {slideIdx > 0 && (
                    <div className="z-30 w-full bg-gradient-to-t from-[#0f172a] via-[#0f172a]/95 to-transparent p-6 absolute bottom-0 flex flex-col items-center">
                    <div className="max-w-6xl w-full flex flex-col gap-5">
                        <div className="w-full h-1.5 bg-slate-800 rounded-full overflow-hidden">
                        <div className="h-full bg-[#0ea5e9] transition-all duration-500 ease-out shadow-[0_0_10px_rgba(14,165,233,0.8)]" style={{ width: `${((slideIdx) / (SLIDES_DATA.length - 1)) * 100}%` }} />
                        </div>
                        
                        <div className="flex justify-between items-center w-full relative">
                        <Button onClick={prev} disabled={slideIdx === 0} className="px-4 py-2 bg-transparent hover:bg-white/5 border-none">
                            <Icon name="arrow-left" size={18} /> BACK
                        </Button>
                        
                        <div className="absolute left-1/2 transform -translate-x-1/2 text-slate-500 font-bold tracking-[0.2em] text-xs md:text-sm uppercase hidden sm:block">
                            PAGE {slideIdx + 1} OF {SLIDES_DATA.length}
                        </div>

                        <Button onClick={next} variant="netflix-white" disabled={slideIdx === SLIDES_DATA.length - 1} className="px-8 py-2 border-none">
                            NEXT <Icon name="arrow-right" size={18} className="text-slate-900" />
                        </Button>
                        </div>
                    </div>
                    </div>
                )}
            </div>
            );
        }
        
        // Initialize the React application
        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);

    </script>
</body>
</html>
